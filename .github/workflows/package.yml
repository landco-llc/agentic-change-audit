name: Package

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer without a v prefix; blank creates a commit-scoped dev version."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: package-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-distribution:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.13"

    steps:
      - name: Check out fixed source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install validation dependencies
        run: |
          python -m pip install --disable-pip-version-check \
            -r requirements-validation.txt

      - name: Validate Skill package
        run: python scripts/validate-skill.py .

      - name: Run all unit tests
        run: python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Compile packaging scripts without artifacts
        run: |
          python - <<'PY'
          from pathlib import Path

          for path in [
              Path("scripts/build-distribution.py"),
              Path("scripts/verify-distribution.py"),
          ]:
              compile(path.read_text(encoding="utf-8"), str(path), "exec")
              print(f"Compiled: {path}")
          PY

  build-distribution:
    needs:
      - test-distribution
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SOURCE_REF: ${{ github.event.pull_request.head.sha || github.sha }}
      REQUESTED_VERSION: ${{ inputs.version }}

    steps:
      - name: Check out fixed source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Install validation dependencies
        run: |
          python -m pip install --disable-pip-version-check \
            -r requirements-validation.txt

      - name: Resolve package identity
        id: package
        run: |
          python - <<'PY'
          import os
          import re

          semver = re.compile(
              r"^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)"
              r"(?:-([0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*))?"
              r"(?:\+([0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*))?$"
          )

          source_ref = os.environ["SOURCE_REF"]
          if not re.fullmatch(r"[0-9a-f]{40}", source_ref):
              raise SystemExit("SOURCE_REF is not a full lowercase commit SHA.")

          version = os.environ.get("REQUESTED_VERSION", "").strip()
          if not version:
              version = f"0.0.0-dev.{source_ref[:12]}"
          if not semver.fullmatch(version):
              raise SystemExit(f"Invalid SemVer: {version}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"version={version}\n")
              output.write(f"source-ref={source_ref}\n")
          PY

      - name: Validate Skill package
        run: python scripts/validate-skill.py .

      - name: Build deterministic package twice
        env:
          VERSION: ${{ steps.package.outputs.version }}
          FIXED_SOURCE_REF: ${{ steps.package.outputs.source-ref }}
        run: |
          python scripts/build-distribution.py \
            --version "$VERSION" \
            --source-ref "$FIXED_SOURCE_REF" \
            --output-dir dist/a

          python scripts/build-distribution.py \
            --version "$VERSION" \
            --source-ref "$FIXED_SOURCE_REF" \
            --output-dir dist/b

      - name: Compare deterministic outputs
        env:
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          prefix="agentic-change-audit-${VERSION}"

          cmp "dist/a/${prefix}.zip" "dist/b/${prefix}.zip"
          cmp "dist/a/${prefix}.manifest.json" "dist/b/${prefix}.manifest.json"
          cmp "dist/a/${prefix}.SHA256SUMS" "dist/b/${prefix}.SHA256SUMS"

      - name: Verify distribution
        env:
          VERSION: ${{ steps.package.outputs.version }}
          FIXED_SOURCE_REF: ${{ steps.package.outputs.source-ref }}
        run: |
          prefix="agentic-change-audit-${VERSION}"

          python scripts/verify-distribution.py \
            "dist/a/${prefix}.zip" \
            --manifest "dist/a/${prefix}.manifest.json" \
            --checksums "dist/a/${prefix}.SHA256SUMS" \
            --expected-version "$VERSION" \
            --expected-source-ref "$FIXED_SOURCE_REF"

          mkdir -p dist/release
          cp "dist/a/${prefix}.zip" dist/release/
          cp "dist/a/${prefix}.manifest.json" dist/release/
          cp "dist/a/${prefix}.SHA256SUMS" dist/release/

      - name: Upload package preview
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: agentic-change-audit-${{ steps.package.outputs.version }}
          path: dist/release/*
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
