name: Validate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "jsonschema>=4.26,<5" "PyYAML>=6,<7"

      - name: Validate Skill package
        run: python scripts/validate-skill.py .

      - name: Validate accepted audit-result fixtures
        run: |
          python scripts/validate-audit-result.py \
            tests/fixtures/valid-full.json \
            tests/fixtures/valid-focused-reaudit.json \
            tests/fixtures/valid-pass-with-comments-deferred.json

      - name: Validate rejected audit-result fixtures
        run: |
          python scripts/validate-audit-result.py --expect-invalid \
            tests/fixtures/invalid-pass-blocking.json \
            tests/fixtures/invalid-pass-pending-human.json \
            tests/fixtures/invalid-pass-deferred-human.json \
            tests/fixtures/invalid-focused-missing-payload.json \
            tests/fixtures/invalid-pass-invalid-validity.json \
            tests/fixtures/invalid-required-check-not-run.json

      - name: Compile validation scripts
        run: python -m compileall -q scripts

      - name: Check trailing whitespace
        shell: bash
        run: |
          if git grep -nI -E '[[:blank:]]+$' -- \
            '*.md' '*.json' '*.py' '*.yml' '*.yaml'; then
            echo "Trailing whitespace detected." >&2
            exit 1
          fi
